envVarGroups:
  - name: huddle-shared
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: WHOP_API_KEY
        sync: false
      - key: WHOP_CLIENT_ID
        sync: false
      - key: WHOP_CLIENT_SECRET
        sync: false
      - key: WHOP_REDIRECT_URI
        sync: false
      - key: GSK_TOKEN
        sync: false
      - key: HUDDLE_INTERNAL_SECRET
        sync: false
      - key: HUDDLE_LIVE_URL
        sync: false

services:
  # ── huddle-api (Web Service) ──────────────────────────────
  - type: web
    name: huddle-api
    runtime: node
    region: oregon
    plan: free
    repo: https://github.com/huddle-bet/huddle-api
    buildCommand: npm install
    startCommand: node --import tsx src/server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - fromGroup: huddle-shared

  # ── huddle-odds-sports (Background Worker — Docker) ───────
  - type: worker
    name: huddle-odds-sports
    runtime: docker
    region: oregon
    plan: standard
    repo: https://github.com/huddle-bet/huddle-odds
    dockerfilePath: ./Dockerfile
    dockerCommand: node --max-old-space-size=1800 --import tsx src/cli.ts poll nba nhl mlb ncaam
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: huddle-shared

  # ── huddle-odds-esports (Background Worker — Docker) ─────
  - type: worker
    name: huddle-odds-esports
    runtime: docker
    region: oregon
    plan: standard
    repo: https://github.com/huddle-bet/huddle-odds
    dockerfilePath: ./Dockerfile
    dockerCommand: node --max-old-space-size=1800 --import tsx src/cli.ts poll cs2 lol valorant dota2 cod rl
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: huddle-shared

  # ── huddle-data (Background Worker — Docker) ─────────────
  - type: worker
    name: huddle-data
    runtime: docker
    region: oregon
    plan: starter
    repo: https://github.com/huddle-bet/huddle-data
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: huddle-shared

  # ── huddle-engine (Background Worker) ────────────────────
  - type: worker
    name: huddle-engine
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/huddle-bet/huddle-engine
    buildCommand: npm install
    startCommand: node --import tsx src/cli.ts worker
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: huddle-shared

  # ── huddle-live (Web Service — exposes fanout WS) ─────────
  # Flipped from worker → web so huddle-api can open an internal WS to
  # /fanout. Realtime broadcast was the #1 Supabase message-cost driver;
  # this replaces it with a direct service-to-service WS. Auth via
  # HUDDLE_INTERNAL_SECRET header — not meant for browser clients.
  - type: web
    name: huddle-live
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/huddle-bet/huddle-live
    buildCommand: npm install
    startCommand: node --import tsx src/cli.ts watch --all
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8081"
      - fromGroup: huddle-shared
